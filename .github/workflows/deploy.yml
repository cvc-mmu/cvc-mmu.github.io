name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build SALMUBench site
        uses: withastro/action@v3
        with:
          path: salmubench

      - name: Prepare final Pages artifact
        run: |
          mkdir -p _site/salmubench
          cp -r salmubench/dist/* _site/salmubench/

          # Future root Astro site example:
          # cp -r home/dist/* _site/

          # Temporary placeholder root page until the main site exists
          if [ ! -f _site/index.html ]; then
            cat > _site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>cvc-mmu</title>
            </head>
            <body style="font-family: sans-serif; max-width: 760px; margin: 4rem auto; padding: 0 1rem;">
              <h1>cvc-mmu</h1>
              <p>Project pages:</p>
              <ul>
                <li><a href="/salmubench/">SALMUBench</a></li>
              </ul>
            </body>
          </html>
          EOF
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4